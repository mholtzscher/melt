name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  ci:
    name: Rust CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: mholtzscher
          extraPullNames: devenv
          authToken: ${{ github.event_name == 'release' && secrets.CACHIX_AUTH_TOKEN || '' }}

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Format
        shell: devenv shell bash -- -e {0}
        run: cargo fmt -- --check

      - name: Clippy
        shell: devenv shell bash -- -e {0}
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        shell: devenv shell bash -- -e {0}
        run: cargo test

      - name: Build (release)
        shell: devenv shell bash -- -e {0}
        run: cargo build --release

      - name: Nix Flake Check
        run: nix flake check
