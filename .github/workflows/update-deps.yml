name: Update Dependencies

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.PAT }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Update flake.lock
        run: nix flake update --accept-flake-config

      - name: Update Cargo.lock
        run: nix develop --accept-flake-config --no-pure-eval --command cargo update

      - name: Update cargoHash
        run: |
          perl -0pi -e 's/cargoHash = "sha256-[^"]+";/cargoHash = "sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=";/' flake.nix

          set +e
          output=$(nix build --accept-flake-config --show-trace 2>&1)
          status=$?
          set -e

          echo "$output"

          hash=$(echo "$output" | sed -n 's/.*got:[[:space:]]*\(sha256-[A-Za-z0-9+\/=]*\).*/\1/p' | tail -n1)
          if [ -z "$hash" ]; then
            echo "Failed to extract updated cargoHash"
            exit "$status"
          fi

          perl -0pi -e "s#cargoHash = \"sha256-[^\"]+\";#cargoHash = \"$hash\";#" flake.nix

      - name: Nix Build
        run: nix build --accept-flake-config

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT }}
          branch: chore/update-deps
          delete-branch: true
          title: "chore: update dependencies"
          commit-message: "chore: update dependencies"
          body: |
            Updates flake.lock and Cargo.lock using scheduled workflow.
